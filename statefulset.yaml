apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zwave-js-ui
  labels:
    app: zwave-js-ui
spec:
  serviceName: "zwave-js-ui"
  replicas: 1
  selector:
    matchLabels:
      app: zwave-js-ui
  template:
    metadata:
      labels:
        app: zwave-js-ui
    spec:
      containers:
        - name: zwave-js-ui
          image: zwavejs/zwave-js-ui:11.14.0
          tty: true
          ports:
            - containerPort: 8091
              name: http
              protocol: TCP
            - containerPort: 3000
              name: websocket
              protocol: TCP
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 400Mi
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
          env:
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: zwave-js-secret
                  key: session_secret
          volumeMounts:
            - name: config
              mountPath: /usr/src/app/store
            - name: zoneinfo
              mountPath: /etc/localtime
              subPath: America/New_York
              readOnly: true
      volumes:
        - name: zoneinfo
          hostPath:
            path: /usr/share/zoneinfo
        - name: config
          hostPath:
            path: /srv/container-data/zwavejs2mqtt
        # Option 1: Use an existing PersistentVolumeClaim instead of a hostPath.
        # - Comment out the 'config' hostPath volume above.
        # - Ensure a PVC named 'zwave-js-ui-pvc' exists in the namespace.
        # - Uncomment the block below to reference that PVC.
        #- name: config
        #  persistentVolumeClaim:
        #    claimName: zwave-js-ui-pvc
# Option 2: Have the StatefulSet create a PVC per replica using volumeClaimTemplates.
# - Remove the 'config' entry under 'volumes:' above (the hostPath block).
# - Keep the container's volumeMount with name 'config' as-is.
# - Uncomment the volumeClaimTemplates section below.
#  volumeClaimTemplates:
#    - metadata:
#        name: config
#      spec:
#        accessModes: ["ReadWriteOnce"]
#        resources:
#          requests:
#            storage: 1Gi
