---
# Example Secret for zwave-js-ui
#
# IMPORTANT: Replace the value of 'session_secret' with a randomly generated
# secret BEFORE applying this file.
#
# Generate a strong secret with:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#   # or
#   openssl rand -hex 32
#
# Then base64-encode it for use in this Secret:
#   echo -n '<your-random-secret>' | base64
#
# Alternatively, create the secret directly with kubectl (recommended):
#   kubectl create secret generic zwave-js-secret \
#     --from-literal=session_secret='<your-random-secret>' \
#     --namespace=zwave
#
# If you are using Flux + SOPS or Sealed Secrets, encrypt this file before
# committing it to your GitOps repository.
apiVersion: v1
kind: Secret
metadata:
  name: zwave-js-secret
  namespace: zwave
type: Opaque
data:
  # Replace this value with your own base64-encoded secret (see instructions above)
  session_secret: REPLACE_WITH_BASE64_ENCODED_SECRET
